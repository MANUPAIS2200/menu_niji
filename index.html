<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NijiDex | Menú</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --pink:#ff1760;
      --purple:#4d1668;
      --cream:#efeee5;
      --navy:#0b1666;
      --yellow:#ede565;
      --green:#41e865;
      --orange:#ff995d;
    }

    html,body{
      margin:0;
      min-height:100%;
      background: radial-gradient(circle at top, #fff9fc 0%, #f4edf4 52%, #ede6ef 100%);
      font-family: Arial, Helvetica, sans-serif;
      color:#1d1430;
    }

    body{
      overflow-x:hidden;
    }

    .background-grid{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.35;
      background-image:
        linear-gradient(rgba(255,90,140,.11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,90,140,.11) 1px, transparent 1px);
      background-size:30px 30px;
    }

    .device{
      width:min(1400px, calc(100% - 28px));
      margin:16px auto 24px;
      display:grid;
      grid-template-columns:1fr 48px 1fr;
      align-items:stretch;
    }

    .panel{
      position:relative;
      border:8px solid var(--purple);
      background:linear-gradient(180deg, var(--pink) 0%, #ff1e61 60%, #f82d72 100%);
      min-height:860px;
      box-shadow:0 16px 0 #57196a, 0 26px 56px rgba(64,17,81,.22);
    }

    .panel-left{
      border-right:none;
      border-radius:34px 0 0 34px;
      padding:22px 24px 28px;
    }

    .panel-right{
      border-left:none;
      border-radius:0 34px 34px 0;
      padding:110px 24px 28px;
      overflow:hidden;
    }

    .panel-top{
      position:relative;
      z-index:2;
      display:flex;
      gap:18px;
      align-items:flex-start;
    }

    .lens{
      width:120px;
      height:120px;
      border-radius:50%;
      background:var(--cream);
      border:8px solid #d9d7ce;
      box-shadow:8px 8px 0 rgba(77,22,104,.34), inset -8px -8px 0 rgba(0,0,0,.08);
      display:grid;
      place-items:center;
      position:relative;
    }

    .lens-inner{
      width:82px;
      height:82px;
      border-radius:50%;
      border:5px solid var(--navy);
      background:radial-gradient(circle at 35% 30%, #9dfff6 0%, #31d3f7 30%, #12c4eb 62%, #0b8ad6 100%);
    }

    .lens-shine{
      position:absolute;
      width:28px;
      height:28px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.92);
      top:25px;
      left:30px;
      transform:rotate(-20deg);
    }

    .lights{
      display:flex;
      gap:12px;
      padding-top:10px;
    }

    .light{
      width:28px;
      height:28px;
      border-radius:50%;
      border:4px solid var(--navy);
      box-shadow:4px 4px 0 rgba(77,22,104,.34);
      animation:blink 2.8s infinite ease-in-out;
    }

    .red{background:#ff3258;}
    .yellow{background:#efe767; animation-delay:.35s;}
    .green{background:#3ee767; animation-delay:.7s;}

    @keyframes blink{
      0%,100%{filter:brightness(1);}
      50%{filter:brightness(1.25);}
    }

    .left-cut{
      position:absolute;
      top:112px;
      left:0;
      right:0;
      height:98px;
      background:var(--purple);
      clip-path:polygon(0 100%, 0 36%, 31% 36%, 58% 0, 100% 0, 100% 100%);
      opacity:.96;
    }

    .right-cut{
      position:absolute;
      top:112px;
      left:0;
      right:-8px;
      height:112px;
      background:var(--purple);
      clip-path:polygon(0 0, 28% 0, 58% 38%, 100% 38%, 100% 100%, 72% 100%, 42% 58%, 0 58%);
      opacity:.95;
    }

    .screen-shell{
      position:relative;
      z-index:2;
      background:var(--cream);
      border:8px solid var(--purple);
      border-radius:34px;
      padding:18px 18px 24px;
      margin-top:54px;
      box-shadow:0 12px 0 rgba(77,22,104,.34);
    }

    .screen-dots{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-bottom:14px;
    }

    .screen-dots span{
      width:12px;
      height:12px;
      border-radius:50%;
      background:#ff2e56;
      border:2px solid var(--purple);
    }

    .screen{
      position:relative;
      min-height:460px;
      overflow:hidden;
      border-radius:16px;
      border:6px solid #83dcf7;
      background:
        linear-gradient(135deg, rgba(255,255,255,.10) 0 24%, transparent 24% 54%, rgba(255,255,255,.08) 54% 70%, transparent 70% 100%),
        linear-gradient(180deg, #1acbe7 0%, #18bae4 54%, #16add8 100%);
    }

    .scanline{
      position:absolute;
      left:0;
      right:0;
      top:-12px;
      height:12px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.75), transparent);
      filter:blur(2px);
      animation:scan 4.8s linear infinite;
    }

    @keyframes scan{
      from{ transform:translateY(0); }
      to{ transform:translateY(470px); }
    }

    .screen-content{
      position:relative;
      z-index:2;
      padding:30px 24px;
    }

    .chip{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(11,22,102,.12);
      border:2px solid rgba(11,22,102,.16);
      font-size:12px;
      font-weight:700;
      letter-spacing:1.2px;
      color:var(--navy);
    }

    h1{
      margin:14px 0 4px;
      font-size:clamp(34px, 4vw, 56px);
      line-height:.95;
      color:#fff8df;
      text-shadow:0 4px 0 rgba(11,22,102,.22);
    }

    .price{
      font-size:20px;
      font-weight:700;
      color:var(--navy);
      margin-bottom:10px;
    }

    .subtitle{
      font-size:28px;
      font-weight:700;
      color:#10224f;
    }

    .description{
      margin:10px 0 20px;
      max-width:560px;
      line-height:1.35;
      font-size:17px;
      color:rgba(22,21,42,.82);
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:10px;
      margin-bottom:18px;
    }

    .stat-card{
      background:rgba(255,255,255,.38);
      border:2px solid rgba(11,22,102,.12);
      border-radius:16px;
      padding:12px;
    }

    .stat-card span{
      display:block;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.5px;
      color:rgba(11,22,102,.72);
      margin-bottom:4px;
    }

    .stat-card strong{
      color:var(--navy);
      font-size:16px;
    }

    .meters{
      display:grid;
      gap:12px;
    }

    .meter-row{
      display:grid;
      grid-template-columns:100px 1fr;
      align-items:center;
      gap:14px;
    }

    .meter-row label{
      font-size:15px;
      font-weight:700;
      color:#102045;
    }

    .meter{
      height:14px;
      border-radius:999px;
      background:rgba(255,255,255,.45);
      border:2px solid rgba(11,22,102,.12);
      overflow:hidden;
    }

    .meter span{
      display:block;
      height:100%;
      width:0;
      border-radius:999px;
      background:linear-gradient(90deg, #1033a1, #0fa7ea 72%, #78f3ff);
      transition:width .35s ease;
    }

    .speaker{
      margin-top:16px;
      margin-left:auto;
      width:150px;
      height:28px;
      border-radius:14px;
      background:repeating-linear-gradient(180deg, transparent 0 6px, var(--navy) 6px 10px);
    }

    .bottom-controls{
      margin-top:24px;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:18px;
    }

    .controls-left{
      display:grid;
      grid-template-columns:auto auto;
      gap:14px 18px;
      align-items:center;
    }

    .big-blue-btn{
      width:74px;
      height:74px;
      border-radius:50%;
      background:#159fe8;
      box-shadow:6px 6px 0 rgba(77,22,104,.34);
    }

    .mini-bars{
      display:flex;
      gap:14px;
    }

    .mini{
      display:block;
      width:44px;
      height:16px;
      border-radius:999px;
      box-shadow:4px 4px 0 rgba(77,22,104,.32);
    }

    .mini.green{ background:#45ea5d; }
    .mini.orange{ background:#ff9659; }

    .dex-label{
      grid-column:1 / span 2;
      width:220px;
      min-height:66px;
      border-radius:10px;
      background:var(--yellow);
      color:#87790d;
      display:grid;
      place-items:center;
      font-weight:700;
      letter-spacing:2px;
      box-shadow:inset 0 -5px 0 rgba(0,0,0,.08);
    }

    .dpad{
      position:relative;
      width:110px;
      height:110px;
    }

    .dpad span{
      position:absolute;
      display:block;
      background:var(--navy);
      border-radius:10px;
      box-shadow:6px 6px 0 rgba(77,22,104,.30);
    }

    .dpad .up, .dpad .down, .dpad .center{
      width:36px;
      left:37px;
    }

    .dpad .up{height:38px; top:0;}
    .dpad .center{height:36px; top:37px;}
    .dpad .down{height:38px; bottom:0;}
    .dpad .left, .dpad .right{
      height:36px;
      width:38px;
      top:37px;
    }
    .dpad .left{left:0;}
    .dpad .right{right:0;}

    .hinge{
      border-top:8px solid var(--purple);
      border-bottom:8px solid var(--purple);
      background:linear-gradient(90deg, #ff8c73 0, #ffb68c 18%, #7b1e76 18%, #5a155f 82%, #4d1668 100%);
      box-shadow:inset -5px 0 0 rgba(0,0,0,.10), inset 6px 0 0 rgba(255,255,255,.08);
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:18px;
    }

    .hinge span{
      display:block;
      height:72px;
      margin:0 7px;
      border-radius:999px;
      background:linear-gradient(90deg, rgba(255,255,255,.08), rgba(0,0,0,.10), rgba(255,255,255,.05));
    }

    .mini-screen{
      position:relative;
      z-index:2;
      min-height:102px;
      border-radius:24px;
      overflow:hidden;
      background:linear-gradient(135deg, #102367, #08114d);
      border:8px solid var(--navy);
      padding:18px 20px;
      margin-bottom:20px;
    }

    .mini-screen-gloss{
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.18) 0 18%, transparent 18% 42%, rgba(255,255,255,.10) 42% 54%, transparent 54% 100%);
    }

    .mini-screen-text{
      position:relative;
      z-index:2;
      color:#d7f9ff;
    }

    .mini-screen-text small{
      display:block;
      font-size:12px;
      font-weight:700;
      letter-spacing:1.2px;
      opacity:.8;
    }

    .mini-screen-text strong{
      display:block;
      margin-top:8px;
      font-size:18px;
      line-height:1.15;
    }

    .blue-grid{
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      gap:6px;
      margin-bottom:18px;
    }

    .blue-grid span{
      min-height:48px;
      border-radius:8px;
      background:linear-gradient(180deg, #28b4f1, #1ba1df);
      border:2px solid rgba(8,17,77,.10);
      box-shadow:inset 0 -4px 0 rgba(0,0,0,.10);
    }

    .categories-box{
      background:rgba(255,255,255,.32);
      border:2px solid rgba(11,22,102,.12);
      border-radius:24px;
      padding:16px;
      margin-bottom:16px;
    }

    .box-title{
      color:#fff4dd;
      font-weight:700;
      margin-bottom:10px;
      font-size:18px;
      text-shadow:0 2px 0 rgba(11,22,102,.20);
    }

    .categories{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .category-btn{
      border:none;
      padding:10px 14px;
      border-radius:999px;
      background:#ffeff5;
      color:var(--purple);
      font-weight:700;
      cursor:pointer;
      transition:transform .18s ease, background .18s ease, color .18s ease;
    }

    .category-btn:hover{
      transform:translateY(-1px);
    }

    .category-btn.active{
      background:var(--navy);
      color:#fff;
    }

    .list-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
      font-size:13px;
      font-weight:700;
      letter-spacing:1px;
      text-transform:uppercase;
      color:#fff2d8;
    }

    #resultsCount,
    #mobileResultsCount{
      min-width:36px;
      text-align:center;
      padding:3px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.26);
    }

    .records-list{
      display:grid;
      gap:10px;
      max-height:465px;
      overflow:auto;
      padding-right:4px;
    }

    .records-list::-webkit-scrollbar{
      width:10px;
    }

    .records-list::-webkit-scrollbar-thumb{
      background:rgba(11,22,102,.24);
      border-radius:999px;
    }

    .records-list::-webkit-scrollbar-track{
      background:rgba(255,255,255,.18);
      border-radius:999px;
    }

    .record{
      border:3px solid rgba(11,22,102,.12);
      border-radius:22px;
      background:rgba(255,255,255,.9);
      padding:14px 14px 12px;
      cursor:pointer;
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
      box-shadow:0 8px 18px rgba(42,10,57,.08);
    }

    .record:hover{
      transform:translateY(-2px);
    }

    .record.active{
      border-color:var(--navy);
      box-shadow:0 10px 24px rgba(11,22,102,.16);
    }

    .record-top{
      display:flex;
      justify-content:space-between;
      align-items:baseline;
      gap:10px;
    }

    .record h3{
      margin:0;
      font-size:18px;
      color:var(--purple);
      line-height:1;
    }

    .record-price{
      font-size:14px;
      font-weight:700;
      color:var(--navy);
    }

    .record p{
      margin:7px 0 10px;
      color:#4d4562;
      line-height:1.2;
    }

    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:5px 9px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      line-height:1;
    }

    .badge.type{
      background:#eafaff;
      color:#005b8f;
    }

    .badge.rare{
      background:#fff4dd;
      color:#a46a00;
    }

    .badge.mission{
      background:#fff0f5;
      color:#a11963;
    }

    .empty-state{
      border:3px dashed rgba(255,255,255,.45);
      border-radius:22px;
      padding:22px;
      text-align:center;
      color:#fff7e6;
      background:rgba(255,255,255,.12);
    }

    .right-controls{
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:20px;
      align-items:center;
      margin-top:18px;
    }

    .small-bars{
      display:flex;
      gap:10px;
    }

    .small-bars span{
      width:48px;
      height:14px;
      border-radius:999px;
      background:var(--navy);
    }

    .dark-buttons{
      display:flex;
      gap:16px;
      justify-content:center;
    }

    .dark-buttons span{
      display:block;
      width:136px;
      height:68px;
      border-radius:12px;
      background:#0f1f72;
      box-shadow:inset 0 -5px 0 rgba(0,0,0,.14);
    }

    .yellow-btn{
      width:54px;
      height:54px;
      border-radius:50%;
      border:5px solid var(--navy);
      background:var(--yellow);
      box-shadow:6px 6px 0 rgba(77,22,104,.35);
    }

    .open-menu-btn{
      display:none;
      margin-top:16px;
      width:100%;
      border:none;
      border-radius:16px;
      padding:16px 18px;
      background:var(--navy);
      color:#fff;
      font-size:18px;
      font-weight:700;
      box-shadow:0 8px 20px rgba(11,22,102,.25);
    }

    .mobile-overlay{
      position:fixed;
      inset:0;
      background:rgba(17, 10, 34, .45);
      opacity:0;
      pointer-events:none;
      transition:opacity .25s ease;
      z-index:998;
    }

    .mobile-overlay.active{
      opacity:1;
      pointer-events:auto;
    }

    .bottom-sheet{
      position:fixed;
      left:0;
      right:0;
      bottom:-100%;
      height:min(80vh, 720px);
      background:#fff4f8;
      border-radius:26px 26px 0 0;
      box-shadow:0 -16px 40px rgba(20, 8, 34, .30);
      transition:bottom .28s ease;
      z-index:999;
      display:none;
    }

    .bottom-sheet.active{
      bottom:0;
    }

    .sheet-header{
      position:sticky;
      top:0;
      background:#fff4f8;
      padding:10px 16px 6px;
      z-index:2;
    }

    .sheet-handle{
      width:62px;
      height:7px;
      background:#d4c5cf;
      border-radius:999px;
      margin:0 auto 8px;
    }

    .sheet-close{
      position:absolute;
      right:14px;
      top:8px;
      width:34px;
      height:34px;
      border:none;
      border-radius:50%;
      background:#ffe4ee;
      color:var(--purple);
      font-size:20px;
      font-weight:700;
      cursor:pointer;
    }

    .sheet-content{
      height:calc(100% - 52px);
      overflow:auto;
      padding:0 14px 18px;
    }

    .sheet-title-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin:4px 0 12px;
    }

    .sheet-title-row h2{
      margin:0;
      font-size:22px;
      color:var(--purple);
    }

    .mobile-categories-box{
      background:#ffeef5;
      border-color:rgba(77,22,104,.10);
    }

    .box-title-mobile{
      color:var(--purple);
      text-shadow:none;
    }

    .mobile-records-list{
      max-height:none;
      padding-right:0;
    }

    @media (max-width:1120px){
      .device{
        grid-template-columns:1fr;
        gap:18px;
      }

      .hinge{
        display:none;
      }

      .panel-left{
        border-right:8px solid var(--purple);
        border-radius:34px;
      }

      .panel-right{
        border-left:8px solid var(--purple);
        border-radius:34px;
        min-height:auto;
        padding-top:86px;
      }

      .panel{
        min-height:auto;
      }
    }

    @media (max-width:768px){
      .device{
        width:min(100% - 12px, 1000px);
        margin:8px auto 18px;
      }

      .panel-left{
        padding-left:14px;
        padding-right:14px;
        border-radius:28px;
      }

      .panel-right{
        display:none;
      }

      .lens{
        width:92px;
        height:92px;
      }

      .lens-inner{
        width:62px;
        height:62px;
      }

      .screen-shell{
        margin-top:34px;
        padding:14px 14px 18px;
      }

      .screen{
        min-height:390px;
      }

      .screen-content{
        padding:22px 16px;
      }

      h1{
        font-size:44px;
      }

      .price{
        font-size:18px;
      }

      .subtitle{
        font-size:24px;
      }

      .description{
        font-size:16px;
      }

      .stats{
        grid-template-columns:1fr;
      }

      .meter-row{
        grid-template-columns:84px 1fr;
      }

      .bottom-controls{
        display:none;
      }

      .open-menu-btn{
        display:block;
      }

      .bottom-sheet{
        display:block;
      }
    }
  </style>
</head>
<body>
  <div class="background-grid"></div>
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <main class="device">
    <section class="panel panel-left">
      <div class="panel-top">
        <div class="lens">
          <div class="lens-inner"></div>
          <div class="lens-shine"></div>
        </div>

        <div class="lights">
          <span class="light red"></span>
          <span class="light yellow"></span>
          <span class="light green"></span>
        </div>
      </div>

      <div class="left-cut"></div>

      <div class="screen-shell">
        <div class="screen-dots">
          <span></span>
          <span></span>
        </div>

        <div class="screen" id="screen">
          <div class="scanline"></div>

          <div class="screen-content">
            <div class="chip" id="itemCategory">CARGANDO</div>
            <h1 id="itemName">NijiDex</h1>
            <div class="price" id="itemPrice">Conectando menú...</div>
            <div class="subtitle" id="itemSubtitle">Esperá un momento</div>

            <p class="description" id="itemDescription">
              El menú se cargará automáticamente desde Firestore.
            </p>

            <div class="stats">
              <div class="stat-card">
                <span>Tipo</span>
                <strong id="itemType">-</strong>
              </div>
              <div class="stat-card">
                <span>Rareza</span>
                <strong id="itemRarity">-</strong>
              </div>
              <div class="stat-card">
                <span>Misión</span>
                <strong id="itemMission">-</strong>
              </div>
            </div>

            <div class="meters">
              <div class="meter-row">
                <label>Energía</label>
                <div class="meter"><span id="energyBar"></span></div>
              </div>
              <div class="meter-row">
                <label>Dulzura</label>
                <div class="meter"><span id="sweetBar"></span></div>

      <button class="open-menu-btn" id="openMenuBtn">Explorar menú</button>

      <div class="bottom-controls">
        <div class="controls-left">
          <div class="big-blue-btn"></div>

          <div class="mini-bars">
            <span class="mini green"></span>
            <span class="mini orange"></span>

        <div class="dpad" aria-hidden="true">

    <div class="hinge" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <section class="panel panel-right">
      <div class="right-cut"></div>

      <div class="mini-screen">
        <div class="mini-screen-gloss"></div>
        <div class="mini-screen-text">
          <small>SISTEMA</small>
          <strong id="statusText">Esperando conexión con Firestore...</strong>
        </div>
      </div>

      <div class="blue-grid" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <section class="categories-box">
        <div class="box-title">Categorías</div>
        <div class="categories" id="desktopCategories"></div>
      </section>

      <div class="list-header">
        <span>Registros</span>
        <span id="resultsCount">0</span>
      </div>

      <section class="records-list" id="desktopMenuList"></section>

      <div class="right-controls">
        <div class="small-bars">
          <span></span>
          <span></span>
        </div>

        <div class="dark-buttons">
          <span></span>
          <span></span>

        <div class="yellow-btn"></div>

  </main>

  <div class="bottom-sheet" id="bottomSheet" aria-hidden="true">
    <div class="sheet-header">
      <div class="sheet-handle"></div>
      <button class="sheet-close" id="closeMenuBtn" aria-label="Cerrar menú">✕</button>
    </div>

    <div class="sheet-content">
      <div class="sheet-title-row">
        <h2>Explorar menú</h2>
        <span id="mobileResultsCount">0</span>
      </div>

      <section class="categories-box mobile-categories-box">
        <div class="box-title box-title-mobile">Categorías</div>
        <div class="categories" id="mobileCategories"></div>
      </section>

      <section class="records-list mobile-records-list" id="mobileMenuList"></section>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC4v0tuI0qCHvyjDRZm3cHPTvwgtkes7xE",
      authDomain: "niji-app-2ac82.firebaseapp.com",
      projectId: "niji-app-2ac82",
      storageBucket: "niji-app-2ac82.firebasestorage.app",
      messagingSenderId: "171293465097",
      appId: "1:171293465097:web:e2a9775e6be3a72b8836d8",
      measurementId: "G-0J6Y4Z2EFD"
    };

    const MENU_ITEMS_COLLECTION = "menuItems";
    const MENU_CATEGORIES_COLLECTION = "menuCategories";
    const DEFAULT_ORDER_FIELD = "order";

    const desktopCategories = document.getElementById("desktopCategories");
    const mobileCategories = document.getElementById("mobileCategories");

    const desktopMenuList = document.getElementById("desktopMenuList");
    const mobileMenuList = document.getElementById("mobileMenuList");

    const countEl = document.getElementById("resultsCount");
    const mobileCountEl = document.getElementById("mobileResultsCount");
    const statusText = document.getElementById("statusText");

    const itemName = document.getElementById("itemName");
    const itemCategory = document.getElementById("itemCategory");
    const itemPrice = document.getElementById("itemPrice");
    const itemSubtitle = document.getElementById("itemSubtitle");
    const itemDescription = document.getElementById("itemDescription");
    const itemType = document.getElementById("itemType");
    const itemRarity = document.getElementById("itemRarity");
    const itemMission = document.getElementById("itemMission");
    const energyBar = document.getElementById("energyBar");
    const sweetBar = document.getElementById("sweetBar");
    const popularBar = document.getElementById("popularBar");

    const openMenuBtn = document.getElementById("openMenuBtn");
    const closeMenuBtn = document.getElementById("closeMenuBtn");
    const bottomSheet = document.getElementById("bottomSheet");
    const mobileOverlay = document.getElementById("mobileOverlay");

    let menuData = [];
    let categoriesData = [];
    let currentFilter = "all";
    let currentId = null;

    function setStatus(message) {
      statusText.textContent = message;
    }

    function isMobile() {
      return window.innerWidth <= 768;
    }

    function openSheet() {
      bottomSheet.classList.add("active");
      mobileOverlay.classList.add("active");
      bottomSheet.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeSheet() {
      bottomSheet.classList.remove("active");
      mobileOverlay.classList.remove("active");
      bottomSheet.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    openMenuBtn.addEventListener("click", openSheet);
    closeMenuBtn.addEventListener("click", closeSheet);
    mobileOverlay.addEventListener("click", closeSheet);

    function validateFirebaseConfig() {
      if (!firebaseConfig.apiKey || firebaseConfig.apiKey === "PEGAR_API_KEY") {
        throw new Error("Completá la configuración de Firebase dentro del HTML.");
      }
    }

    function formatPrice(value) {
      if (typeof value === "number") {
        return "$ " + value.toLocaleString("es-AR");
      }
      if (typeof value === "string" && value.trim() !== "") {
        return value;
      }
      return "Consultar";
    }

    function normalizeCategory(rawItem) {
      const value = rawItem.categoryLabel || rawItem.category || "Sin categoría";
      return String(value).trim();
    }

    function normalizeType(rawItem) {
      const category = normalizeCategory(rawItem).toLowerCase();

      if (category.includes("fr")) return "Frío";
      if (category.includes("dul")) return "Dulce";
      if (category.includes("brunch") || category.includes("desay")) return "Brunch";
      if (category.includes("combo")) return "Combo";
      return "Caliente";
    }

    function normalizeTags(rawItem) {
      if (Array.isArray(rawItem.tags)) {
        return rawItem.tags.filter(Boolean).map(t => String(t));
      }
      return [];
    }

    function guessMeters(type, featured) {
      const base = {
        energy: 45,
        sweet: 40,
        popular: featured ? 92 : 70
      };

      switch (type) {
        case "Caliente":
          base.energy = 82;
          base.sweet = 24;
          break;
        case "Frío":
          base.energy = 38;
          base.sweet = 58;
          break;
        case "Dulce":
          base.energy = 20;
          base.sweet = 90;
          break;
        case "Brunch":
          base.energy = 55;
          base.sweet = 12;
          break;
        case "Combo":
          base.energy = 65;
          base.sweet = 50;
          break;
      }

      return base;
    }

    function mapFirestoreItem(docSnapshot) {
      const raw = docSnapshot.data();
      const type = normalizeType(raw);
      const categoryLabel = normalizeCategory(raw);
      const tags = normalizeTags(raw);
      const meters = guessMeters(type, !!raw.featured);

      return {
        id: docSnapshot.id,
        name: raw.name || "Sin nombre",
        subtitle: raw.shortDescription || raw.description || categoryLabel,
        category: categoryLabel,
        categoryKey: categoryLabel.toLowerCase().trim(),
        categoryId: raw.categoryId ? String(raw.categoryId).trim() : "",
        categoryLabel: categoryLabel.toUpperCase(),
        price: formatPrice(raw.price),
        description: raw.description || "Producto disponible en Niji Café.",
        type,
        rarity: raw.featured ? "Destacado" : (tags[0] || "Clásico"),
        mission: raw.stockMode || "Disponible",
        energy: meters.energy,
        sweet: meters.sweet,
        popular: meters.popular,
        order: typeof raw.order === "number" ? raw.order : 9999
      };
    }

    function mapCategory(docSnapshot) {
      const raw = docSnapshot.data();
      return {
        id: String(docSnapshot.id).trim(),
        label: raw.label || docSnapshot.id,
        active: !!raw.active,
        order: typeof raw.order === "number" ? raw.order : 9999
      };
    }

    function capitalize(value) {
      const text = String(value || "").trim();
      if (!text) return "-";
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function updateDisplay(item) {
      itemName.textContent = item.name;
      itemCategory.textContent = item.categoryLabel;
      itemPrice.textContent = item.price;
      itemSubtitle.textContent = item.subtitle;
      itemDescription.textContent = item.description;
      itemType.textContent = item.type;
      itemRarity.textContent = capitalize(item.rarity);
      itemMission.textContent = capitalize(item.mission);
      energyBar.style.width = item.energy + "%";
      sweetBar.style.width = item.sweet + "%";
      popularBar.style.width = item.popular + "%";
      setStatus("Registro detectado: " + item.name);
    }

    function createCategoryButton(label, value, isActive) {
      const btn = document.createElement("button");
      btn.className = "category-btn" + (isActive ? " active" : "");
      btn.dataset.filter = value;
      btn.textContent = label;

      btn.addEventListener("click", () => {
        document.querySelectorAll(".category-btn").forEach(x => x.classList.remove("active"));
        document.querySelectorAll('.category-btn[data-filter="' + value + '"]').forEach(x => {
          x.classList.add("active");
        });
        currentFilter = value;
        renderList();
      });

      return btn;
    }

    function buildCategories() {
      desktopCategories.innerHTML = "";
      mobileCategories.innerHTML = "";

      desktopCategories.appendChild(createCategoryButton("Todos", "all", currentFilter === "all"));
      mobileCategories.appendChild(createCategoryButton("Todos", "all", currentFilter === "all"));

      let categoriesToRender = [];

      if (categoriesData.length) {
        categoriesToRender = categoriesData
          .filter(cat => cat.active)
          .map(cat => ({
            id: String(cat.id).trim(),
            label: cat.label
          }))
          .filter(cat =>
            menuData.some(item =>
              item.categoryId === cat.id || item.categoryKey === cat.id.toLowerCase()
            )
          );
      } else {
        const seen = new Set();
        menuData.forEach(item => {
          const key = item.categoryId || item.categoryKey;
          if (!seen.has(key)) {
            seen.add(key);
            categoriesToRender.push({
              id: key,
              label: item.category
            });
          }
        });
      }

      categoriesToRender.forEach(category => {
        const value = String(category.id).toLowerCase().trim();
        desktopCategories.appendChild(createCategoryButton(category.label, value, currentFilter === value));
        mobileCategories.appendChild(createCategoryButton(category.label, value, currentFilter === value));
      });
    }

    function buildRecord(item) {
      const article = document.createElement("article");
      article.className = "record";
      if (item.id === currentId) article.classList.add("active");

      article.innerHTML = `
        <div class="record-top">
          <h3>${escapeHtml(item.name)}</h3>
          <span class="record-price">${escapeHtml(item.price)}</span>
        </div>
        <p>${escapeHtml(item.subtitle)}</p>
        <div class="badges">
          <span class="badge type">${escapeHtml(item.type)}</span>
          <span class="badge rare">${escapeHtml(capitalize(item.rarity))}</span>
          <span class="badge mission">${escapeHtml(capitalize(item.mission))}</span>
        </div>
      `;

      article.addEventListener("click", () => {
        currentId = item.id;
        updateDisplay(item);
        renderList();

        if (isMobile()) {
          closeSheet();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });

      return article;
    }

    function getFilteredItems() {
      if (currentFilter === "all") return menuData;

      return menuData.filter(item => {
        return item.categoryKey === currentFilter || item.categoryId.toLowerCase() === currentFilter;
      });
    }

    function renderList() {
      const filtered = getFilteredItems();

      desktopMenuList.innerHTML = "";
      mobileMenuList.innerHTML = "";

      if (!filtered.length) {
        countEl.textContent = "0";
        mobileCountEl.textContent = "0";
        const emptyHtml = '<div class="empty-state">No hay productos para esta categoría.</div>';
        desktopMenuList.innerHTML = emptyHtml;
        mobileMenuList.innerHTML = emptyHtml;
        return;
      }

      if (!filtered.some(item => item.id === currentId)) {
        currentId = filtered[0].id;
        updateDisplay(filtered[0]);
      }

      filtered.forEach(item => {
        desktopMenuList.appendChild(buildRecord(item));
        mobileMenuList.appendChild(buildRecord(item));
      });

      countEl.textContent = String(filtered.length);
      mobileCountEl.textContent = String(filtered.length);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadCategories(db) {
      try {
        const categoriesRef = collection(db, MENU_CATEGORIES_COLLECTION);
        const categoriesQuery = query(
          categoriesRef,
          where("active", "==", true),
          orderBy(DEFAULT_ORDER_FIELD, "asc")
        );

        const snapshot = await getDocs(categoriesQuery);
        categoriesData = snapshot.docs.map(mapCategory);
      } catch (error) {
        console.warn("No se pudieron cargar las categorías. Se usarán las de los productos.", error);
        categoriesData = [];
      }
    }

    async function loadMenu() {
      try {
        validateFirebaseConfig();

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        setStatus("Consultando registros en Firestore...");

        await loadCategories(db);

        const menuRef = collection(db, MENU_ITEMS_COLLECTION);
        const menuQuery = query(
          menuRef,
          where("active", "==", true),
          orderBy(DEFAULT_ORDER_FIELD, "asc")
        );

        const snapshot = await getDocs(menuQuery);
        menuData = snapshot.docs.map(mapFirestoreItem);

        if (!menuData.length) {
          setStatus("No se encontraron productos activos.");
          itemName.textContent = "Sin productos";
          itemCategory.textContent = "SIN DATOS";
          itemPrice.textContent = "Revisá Firestore";
          itemSubtitle.textContent = "No hay registros activos";
          itemDescription.textContent = "La colección no devolvió productos con active = true.";
          itemType.textContent = "-";
          itemRarity.textContent = "-";
          itemMission.textContent = "-";
          energyBar.style.width = "0%";
          sweetBar.style.width = "0%";
          popularBar.style.width = "0%";
          buildCategories();
          renderList();
          return;
        }

        menuData.sort((a, b) => {
          const aCat = a.categoryId || a.categoryKey;
          const bCat = b.categoryId || b.categoryKey;
          if (aCat < bCat) return -1;
          if (aCat > bCat) return 1;
          return a.order - b.order;
        });

        currentId = menuData[0].id;
        buildCategories();
        updateDisplay(menuData[0]);
        renderList();
        setStatus("Menú cargado correctamente desde Firestore.");
      } catch (error) {
        console.error(error);
        setStatus("Error al cargar Firestore.");
        itemName.textContent = "Error de conexión";
        itemCategory.textContent = "FIRESTORE";
        itemPrice.textContent = "Revisar configuración";
        itemSubtitle.textContent = "No se pudo levantar el menú";
        itemDescription.textContent = error.message || "Ocurrió un error al consultar Firestore.";
        itemType.textContent = "-";
        itemRarity.textContent = "-";
        itemMission.textContent = "-";
        energyBar.style.width = "0%";
        sweetBar.style.width = "0%";
        popularBar.style.width = "0%";

        desktopMenuList.innerHTML = '<div class="empty-state">No se pudo cargar el menú. Revisá la consola del navegador.</div>';
        mobileMenuList.innerHTML = '<div class="empty-state">No se pudo cargar el menú. Revisá la consola del navegador.</div>';
        countEl.textContent = "0";
        mobileCountEl.textContent = "0";
      }
    }

    loadMenu();
  </script>
</body>
